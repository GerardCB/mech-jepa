defaults:
  - _self_
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

hydra:
  output_subdir: null

# ── Experiment ──
experiment_name: mechjepa_pusht
seed: 42

# ── Wandb ──
wandb:
  enable: true
  project: mechjepa
  entity: null
  name: mechjepa_pusht_v1

# ── Data ──
dataset_name: pusht
embedding_dir: null  # path to Push-T slot+action pickle
cache_dir: null

# ── Training ──
trainer:
  max_epochs: 200
  strategy: ddp
  devices: auto
  accelerator: gpu
  precision: 16-mixed
  log_every_n_steps: 10

batch_size: 128
num_workers: 8
frameskip: 5  # Push-T frameskip (matches C-JEPA/LeWorldModel)

# ── Dynamics ──
dinowm:
  history_size: 3
  num_preds: 1

n_steps: ${eval:'${dinowm.num_preds} + ${dinowm.history_size}'}

# ── Slots ──
videosaur:
  NUM_SLOTS: 4    # Push-T uses 4 slots (agent + 3 T-block parts)
  SLOT_DIM: 128

# ── Action Conditioning ──
action_dim: 2  # Push-T: 2D push vector (dx, dy)

# ── Masking ──
num_masked_slots: 2

# ── Predictor ──
predictor:
  depth: 6
  heads: 16
  mlp_dim: 2048
  dim_head: 64
  dropout: 0.1

# ── Mechanism Bottleneck ──
codebook:
  num_mechanisms: 8    # fewer than CLEVRER (4 slots → 16 pairs, 8 dims enough)
  edge_hidden_dim: 256
  bottleneck_recon_weight: 0.0

# ── System M ──
system_m:
  surprise_threshold: 1.0
  enabled: false

# ── Learning Rates ──
predictor_lr: 5e-4
codebook_lr: 1e-3
warmup_epochs: 10
max_grad_norm: 0.05

# ── Rollout ──
rollout:
  save_rollout: false
  rollout_batch_size: 64
  rollout_only: false
  rollout_checkpoint: null

# ── Checkpointing ──
output_model_name: mechjepa_pusht
dump_object: true
