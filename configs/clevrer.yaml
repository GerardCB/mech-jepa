defaults:
  - _self_
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

hydra:
  output_subdir: null

# ── Experiment ──
experiment_name: mechjepa_clevrer
seed: 42

# ── Wandb ──
wandb:
  enable: true
  project: mechjepa
  entity: null  # set via CLI or env var
  name: mechjepa_clevrer_v1

# ── Data ──
dataset_name: clevrer
embedding_dir: null  # path to pre-extracted slot pkl
cache_dir: null

# ── Training ──
trainer:
  max_epochs: 30
  strategy: ddp
  devices: auto
  accelerator: gpu
  precision: 16-mixed
  log_every_n_steps: 10

batch_size: 2048
num_workers: 8
image_size: 224
patch_size: 16
frameskip: 2

# ── Dynamics ──
dinowm:
  history_size: 6
  num_preds: 10

n_steps: ${eval:'${dinowm.num_preds} + ${dinowm.history_size}'}

# ── VideoSAUR Slots ──
videosaur:
  NUM_SLOTS: 7
  SLOT_DIM: 128

# ── Masking ──
num_masked_slots: 4  # max masked slots per batch (actual count is random 0..N)

# ── Predictor (Transformer) ──
predictor:
  depth: 6
  heads: 16
  mlp_dim: 2048
  dim_head: 64
  dropout: 0.1

# ── Mechanism Codebook (OUR CONTRIBUTION) ──
codebook:
  num_mechanisms: 16
  temperature: 0.1
  commitment_weight: 0.25
  diversity_weight: 0.1
  dead_threshold: 0.01
  edge_hidden_dim: 256
  maintenance_every_n_epochs: 5

# ── System M ──
system_m:
  surprise_threshold: 1.0
  enabled: true  # enable System M for codebook maintenance

# ── CTT Losses (mechanism-level) ──
ctt_inv_weight: 0.0
ctt_suf_weight: 0.0
ctt_adj_threshold: 0.3
ctt_start_epoch: 20

# ── Learning Rates ──
predictor_lr: 5e-4
codebook_lr: 1e-3  # slightly higher LR for codebook
warmup_epochs: 5
max_grad_norm: 0.05

# ── Rollout ──
rollout:
  save_rollout: true
  rollout_batch_size: 64
  rollout_only: false
  rollout_checkpoint: null

# ── Checkpointing ──
output_model_name: mechjepa_clevrer
dump_object: true
